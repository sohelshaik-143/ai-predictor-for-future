version: '3.8'
services:
  # -------------------
  # MongoDB Database
  # -------------------
  mongodb:
    image: mongo:6.0
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: aipredictor
    volumes:
      - mongodb-data:/data/db
    ports:
      - "27017:27017"

  # -------------------
  # Backend (Spring Boot)
  # -------------------
  backend:
    build: ./backend
    depends_on:
      - mongodb
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/aipredictor
      SPRING_DATA_MONGODB_DATABASE: aipredictor
      JWT_SECRET: ${JWT_SECRET:-0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
      ML_SERVICE_URL: ${ML_SERVICE_URL:-http://ml-service:8001}
    ports:
      - "8084:8084"

  # -------------------
  # ML Service
  # -------------------
  ml-service:
    build: ./ml-service
    environment:
      ML_API_KEY: ${ML_API_KEY}
    ports:
      - "8001:8001"

  # -------------------
  # Frontend (React)
  # -------------------
  frontend:
    build: ./frontend
    ports:
      - "3000:80"

volumes:
  mongodb-data:
