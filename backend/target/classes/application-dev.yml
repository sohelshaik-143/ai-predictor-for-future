spring:

  # ===============================
  # H2 DATABASE (for testing only)
  # ===============================
  datasource:
    url: jdbc:h2:mem:aipredictor;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  h2:
    console:
      enabled: true
      path: /h2-console

  # ===============================
  # OAUTH2 CONFIG
  # ===============================
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:not-configured}
            client-secret: ${GOOGLE_CLIENT_SECRET:not-configured}
            scope: email, profile
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"

          github:
            client-id: ${GITHUB_CLIENT_ID:not-configured}
            client-secret: ${GITHUB_CLIENT_SECRET:not-configured}
            scope: user:email
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"

          linkedin:
            client-id: ${LINKEDIN_CLIENT_ID:not-configured}
            client-secret: ${LINKEDIN_CLIENT_SECRET:not-configured}
            scope: r_liteprofile, r_emailaddress
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"