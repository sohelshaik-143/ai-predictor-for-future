# ===============================
# SERVER
# ===============================
server.port=8084

# ===============================
# DATABASE (MongoDB - Local)
# ===============================
spring.data.mongodb.uri=mongodb://localhost:27017/aipredictor
spring.data.mongodb.auto-index-creation=true

# ===============================
# JWT CONFIG
# ===============================
jwt.secret=0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
jwt.expiration=86400000

# ===============================
# AI SERVICE
# ===============================
ai.service.url=http://localhost:5001/predict


# =====================================================
# OAUTH2 CONFIGURATION
# IMPORTANT:
# You MUST set environment variables before running
# =====================================================


# ===============================
# GOOGLE OAUTH2
# ===============================
spring.security.oauth2.client.registration.google.client-id=254643186728-vmn9n6hijohr6kisas2g381v82hkjmo3.apps.googleusercontent.com
spring.security.oauth2.client.registration.google.client-secret=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
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}


# ===============================
# GITHUB OAUTH2
# ===============================
spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID:not-configured}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET:not-configured}
spring.security.oauth2.client.registration.github.scope=read:user,user:email
spring.security.oauth2.client.registration.github.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}

# ===============================
# LINKEDIN OAUTH2
# ===============================

spring.security.oauth2.client.registration.linkedin.client-id=${LINKEDIN_CLIENT_ID:not-configured}
spring.security.oauth2.client.registration.linkedin.client-secret=${LINKEDIN_CLIENT_SECRET:not-configured}
spring.security.oauth2.client.registration.linkedin.client-name=LinkedIn
spring.security.oauth2.client.registration.linkedin.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.linkedin.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.linkedin.scope=r_liteprofile,r_emailaddress

spring.security.oauth2.client.provider.linkedin.authorization-uri=https://www.linkedin.com/oauth/v2/authorization
spring.security.oauth2.client.provider.linkedin.token-uri=https://www.linkedin.com/oauth/v2/accessToken
spring.security.oauth2.client.provider.linkedin.user-info-uri=https://api.linkedin.com/v2/me
spring.security.oauth2.client.provider.linkedin.user-name-attribute=id